<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MOMOSE 修理管理</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCMA5Bm10rvziDOtrflhnVDH6FPwss_43A",
    authDomain: "momose-535c2.firebaseapp.com",
    projectId: "momose-535c2",
    storageBucket: "momose-535c2.firebasestorage.app",
    messagingSenderId: "826173538125",
    appId: "1:826173538125:web:e1a99fe4aef2758aabc104"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // グローバルに公開
  window.db = db;
  window.fsCollection = collection;
  window.fsDoc = doc;
  window.fsSetDoc = setDoc;
  window.fsGetDocs = getDocs;
  window.fsDeleteDoc = deleteDoc;
  window.fsOnSnapshot = onSnapshot;
  window.fsQuery = query;
  window.fsOrderBy = orderBy;

  // 初期化完了を通知
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #252540;
  --border: #2e2e4a;
  --text: #e8e8f0;
  --muted: #6b6b8a;
  --blue: #4d7fff;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f97316;
  --purple: #a855f7;
  --accent: #e8a838;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ヘッダー */
.header {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 10px;
}

.logo { font-size: 18px; font-weight: 900; letter-spacing: 2px; color: var(--accent); }
.logo-sub { font-size: 11px; color: var(--muted); margin-left: 4px; }

.alert-badge {
  background: var(--red);
  color: #fff;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 12px;
  font-weight: 700;
  display: none;
}

.sync-status {
  margin-left: auto;
  font-size: 11px;
  color: var(--green);
  display: none;
}

/* ナビ */
nav {
  display: flex;
  gap: 4px;
  padding: 8px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

nav button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  touch-action: manipulation;
}

nav button.active {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
  font-weight: 700;
}

/* メインコンテンツ */
.view { display: none; padding: 16px; }
.view.active { display: block; }

/* カレンダー */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.cal-nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 16px;
  cursor: pointer;
  touch-action: manipulation;
}

.cal-title { font-size: 18px; font-weight: 700; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin-bottom: 16px;
}

.dow {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 0;
  color: var(--muted);
}

.dow:first-child { color: #ef4444; }
.dow:last-child { color: #4d7fff; }

.cal-cell {
  min-height: 60px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px;
  cursor: pointer;
  touch-action: manipulation;
  position: relative;
  overflow: hidden;
}

.cal-cell:active { opacity: 0.7; }
.cal-cell.other-month { opacity: 0.3; }
.cal-cell.today { border-color: var(--red); border-width: 2px; }
.cal-cell.selected { border-color: var(--blue); border-width: 2px; background: #1a2a4a; }

.cal-day {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
}

.cal-cell.sun .cal-day { color: #ef4444; }
.cal-cell.sat .cal-day { color: #4d7fff; }

.cal-chip {
  font-size: 9px;
  border-radius: 3px;
  padding: 1px 3px;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #fff;
}

.cal-more {
  font-size: 9px;
  color: var(--muted);
  margin-top: 1px;
}

/* 日別詳細 */
.day-detail {
  background: var(--surface);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}

.day-detail-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}

.count-chip {
  display: inline-block;
  border-radius: 20px;
  padding: 2px 12px;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 12px;
}

/* カード */
.card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.customer-name { font-size: 16px; font-weight: 700; }
.phone { font-size: 12px; color: var(--muted); margin-top: 2px; }
.repair-content { font-size: 13px; color: var(--muted); margin: 6px 0; line-height: 1.4; }

.tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.tag {
  font-size: 11px;
  border-radius: 6px;
  padding: 2px 8px;
  font-weight: 600;
  color: #fff;
}

/* ステータスボタン */
.status-btn {
  display: inline-block;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
  min-width: 80px;
  text-align: center;
}

.status-done {
  background: var(--green);
  cursor: default;
}

/* 一覧 */
.search-box {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: inherit;
  margin-bottom: 12px;
}

.filter-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  overflow-x: auto;
}

.filter-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  touch-action: manipulation;
}

.filter-btn.active {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
  font-weight: 700;
}

.list-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.list-date {
  font-size: 12px;
  color: var(--muted);
  min-width: 40px;
  text-align: center;
}

.list-info { flex: 1; min-width: 0; }
.list-name { font-size: 15px; font-weight: 700; }
.list-repair { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.list-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.edit-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  touch-action: manipulation;
}

.del-btn {
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  touch-action: manipulation;
}

/* フォーム */
.form-section {
  background: var(--surface);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}

.form-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 12px; }
label:first-of-type { margin-top: 0; }

.inp {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 15px;
  font-family: inherit;
}

.inp:focus { outline: none; border-color: var(--blue); }

textarea.inp { min-height: 80px; resize: vertical; }

select.inp { appearance: none; cursor: pointer; }

.btn-primary {
  width: 100%;
  background: var(--blue);
  border: none;
  color: #fff;
  border-radius: 10px;
  padding: 14px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 16px;
  touch-action: manipulation;
}

.btn-cancel {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 10px;
  padding: 12px;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  margin-top: 8px;
  touch-action: manipulation;
}

/* OCRボタン */
.ocr-btn {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--blue);
  color: var(--blue);
  border-radius: 10px;
  padding: 12px;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-bottom: 16px;
  touch-action: manipulation;
}

/* OCRモーダル */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--surface);
  border-radius: 16px;
  padding: 20px;
  width: 100%;
  max-width: 500px;
}

.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

.upload-area {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  touch-action: manipulation;
}

.upload-icon { font-size: 40px; margin-bottom: 8px; }
.upload-text { color: var(--muted); font-size: 14px; }

.ocr-loading { display: none; text-align: center; padding: 20px; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* 委託先 */
.vendor-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 8px;
}

.vendor-name { font-size: 15px; font-weight: 600; }

/* 設定 */
.setting-card {
  background: var(--surface);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}

/* トースト */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #333;
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  z-index: 999;
  transition: transform 0.3s;
  white-space: nowrap;
}

#toast.show { transform: translateX(-50%) translateY(0); }
#toast.ok { background: #22c55e; }
#toast.warn { background: #f97316; }
#toast.err { background: #ef4444; }

.empty { color: var(--muted); text-align: center; padding: 28px 0; }
.done-label { font-size: 12px; color: var(--green); margin: 12px 0 8px; font-weight: 700; }

.required::after { content: ' *'; color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <span class="logo">✂ MOMOSE</span>
  <span class="logo-sub">修理管理</span>
  <div class="alert-badge" id="alertBadge">⚠ 要確認 <span id="alertCount">0</span>件</div>
  <span class="sync-status" id="syncStatus">● リアルタイム同期中</span>
</div>

<nav id="nav">
  <button onclick="goto('dashboard')" id="nav-dashboard">🏠 ホーム</button>
  <button onclick="goto('register')" id="nav-register">＋ 受付</button>
  <button onclick="goto('list')" id="nav-list">📋 一覧</button>
  <button onclick="goto('vendors')" id="nav-vendors">🏭 委託先</button>
  <button onclick="goto('settings')" id="nav-settings">⚙️ 設定</button>
</nav>

<!-- ホーム（カレンダー） -->
<div class="view" id="view-dashboard">
  <div class="cal-header">
    <button class="cal-nav-btn" onclick="calPrev()">‹</button>
    <span class="cal-title" id="calTitle"></span>
    <button class="cal-nav-btn" onclick="calNext()">›</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div id="dayDetail"></div>
</div>

<!-- 受付登録 -->
<div class="view" id="view-register">
  <div class="form-section">
    <div class="form-title">＋ 新規受付登録</div>
    <button class="ocr-btn" onclick="openOcrModal()">📷 伝票を写真で読み取る（自動入力）</button>
    <p style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px;">↑ 写真を撮るだけで下のフォームに自動入力されます</p>

    <label class="required">受取予定日</label>
    <input type="date" id="f-date" class="inp">

    <label class="required">お客様名</label>
    <input type="text" id="f-name" class="inp" placeholder="山田 花子">

    <label>電話番号</label>
    <input type="tel" id="f-phone" class="inp" placeholder="090-xxxx-xxxx">

    <label class="required">修理内容</label>
    <textarea id="f-repair" class="inp" placeholder="スラックス丈詰め 2cm"></textarea>

    <label>委託先</label>
    <select id="f-vendor" class="inp"></select>

    <input type="hidden" id="f-edit-id">
    <button class="btn-primary" onclick="saveOrder()">💾 登録する</button>
    <button class="btn-cancel" onclick="goto('dashboard')">キャンセル</button>
  </div>
</div>

<!-- 一覧 -->
<div class="view" id="view-list">
  <input type="text" class="search-box" id="searchBox" placeholder="🔍 お客様名・内容で検索" oninput="renderList()">
  <div class="filter-tabs">
    <button class="filter-btn active" onclick="setFilter('all', this)">すべて (<span id="cnt-all">0</span>)</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">未完成 (<span id="cnt-pending">0</span>)</button>
    <button class="filter-btn" onclick="setFilter('done', this)">完成済 (<span id="cnt-done">0</span>)</button>

  <div id="list-items"></div>
</div>

<!-- 委託先 -->
<div class="view" id="view-vendors">
  <div class="form-section">
    <div class="form-title">🏭 委託先管理</div>
    <div id="vendor-list"></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <input type="text" id="new-vendor" class="inp" placeholder="新しい委託先名" style="flex:1">
      <button class="btn-primary" style="flex:0 0 70px;margin-top:0" onclick="addVendor()">追加</button>

    <p style="font-size:12px;color:var(--muted);margin-top:8px;">※「店舗内作業」は削除できません</p>

<!-- 設定 -->
<div class="view" id="view-settings">
  <div class="setting-card">
    <div class="form-title">⚙️ 設定</div>
    <label>📷 Claude APIキー（写真読み取り用）</label>
    <input type="password" id="s-apikey" class="inp" placeholder="sk-ant-api03-..." style="margin-top:6px;">
    <p style="font-size:12px;color:var(--muted);margin-top:6px;">キーはこの端末のみに保存されます。</p>
    <button class="btn-primary" onclick="saveApiKey()">💾 保存する</button>
    <button class="btn-cancel" onclick="goto('dashboard')">キャンセル</button>

  <div class="setting-card">
    <div style="font-size:14px;font-weight:700;margin-bottom:8px;">📊 データ移行</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">スプレッドシートのデータをFirebaseにインポートできます。</p>
    <button class="btn-primary" style="background:var(--orange)" onclick="importFromSheet()">📥 スプシからインポート</button>
  </div>
  <div class="setting-card">
    <div style="font-size:14px;font-weight:700;margin-bottom:8px;">🔥 Firebase接続状況</div>
    <p id="fb-status" style="font-size:13px;color:var(--green);">● 接続中</p>
  </div>
</div>

<!-- OCRモーダル -->
<div class="modal-overlay" id="ocrModal">
  <div class="modal">
    <div class="modal-title">📷 伝票を写真で読み取る</div>
    <div id="ocr-upload-area" class="upload-area" onclick="document.getElementById('ocr-input').click()">
      <div class="upload-icon">📄</div>
      <div class="upload-text">ここをタップして伝票の写真を選択<br>カメラで撮影またはアルバムから選択</div>
    </div>
    <div class="ocr-loading" id="ocr-loading">
      <div class="spinner"></div>
      <p style="color:var(--muted)">読み取り中...</p>
    </div>
    <input type="file" id="ocr-input" accept="image/*" capture="environment" style="display:none" onchange="handleOcrImage(event)">
    <button class="btn-cancel" onclick="closeOcrModal()">キャンセル</button>
  </div>
</div>

<!-- トースト -->
<div id="toast"></div>

<script>
// ══════════════════════════════
// データ
// ══════════════════════════════
let orders = [];
let vendors = [
  {id:'shop', name:'店舗内作業', isShop:true}
];
let currentView = 'dashboard';
let listFilter = 'all';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selectedDate = new Date().toISOString().slice(0,10);
let editId = null;
let unsubOrders = null;

const STATUS_LIST_SHOP = ['受付中','作業中','完成'];
const STATUS_LIST_EXT = ['受付中','委託中','店舗に戻った','完成'];
const STATUS_COLOR = {
  '受付中': '#5a5a7a',
  '作業中': '#e67e22',
  '委託中': '#2980b9',
  '店舗に戻った': '#8e44ad',
  '完成': '#27ae60'
};

function getStatuses(vendorId) {
  return vendorId === 'shop' ? STATUS_LIST_SHOP : STATUS_LIST_EXT;
}

function isDone(o) { return o.status === '完成'; }
function todayStr() { return new Date().toISOString().slice(0,10); }
function newId() { return 'o' + Date.now() + Math.floor(Math.random()*1000); }

// ══════════════════════════════
// Firebase操作
// ══════════════════════════════
async function fbSaveOrder(order) {
  if (!window.db) return;
  try {
    await window.fsSetDoc(window.fsDoc(window.db, 'orders', order.id), order);
  } catch(e) {
    showToast('⚠ 保存エラー: ' + e.message, 'err');
  }
}

async function fbDeleteOrder(id) {
  if (!window.db) return;
  try {
    await window.fsDeleteDoc(window.fsDoc(window.db, 'orders', id));
  } catch(e) {
    showToast('⚠ 削除エラー: ' + e.message, 'err');
  }
}

async function fbSaveVendors() {
  if (!window.db) return;
  try {
    await window.fsSetDoc(window.fsDoc(window.db, 'config', 'vendors'), { list: vendors });
  } catch(e) {
    console.warn('委託先保存エラー:', e);
  }
}

async function loadVendors() {
  if (!window.db) return;
  try {
    const snap = await window.fsGetDocs(window.fsCollection(window.db, 'config'));
    snap.forEach(d => {
      if (d.id === 'vendors' && d.data().list) {
        vendors = d.data().list;
        renderVendors();
        renderVendorSelect();
      }
    });
  } catch(e) { console.warn('委託先読み込みエラー:', e); }
}

function startRealtimeSync() {
  if (!window.db) return;
  if (unsubOrders) unsubOrders();

  const q = window.fsQuery(window.fsCollection(window.db, 'orders'));
  unsubOrders = window.fsOnSnapshot(q, (snap) => {
    orders = [];
    snap.forEach(d => orders.push(d.data()));
    // 日付でソート
    orders.sort((a,b) => (a.pickupDate||'').localeCompare(b.pickupDate||''));

    updateAlertBadge();
    if (currentView === 'dashboard') renderDashboard();
    if (currentView === 'list') renderList();

    document.getElementById('syncStatus').style.display = 'block';
  }, (err) => {
    console.warn('同期エラー:', err);
    document.getElementById('fb-status').style.color = 'var(--red)';
    document.getElementById('fb-status').textContent = '● 接続エラー: ' + err.message;
  });
}

function goto(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');

  if (navBtn) navBtn.classList.add('active');

  if (view === 'dashboard') renderDashboard();

  if (view === 'vendors') renderVendors();

// ══════════════════════════════
// アラートバッジ
// ══════════════════════════════
function updateAlertBadge() {
  const today = todayStr();
  const overdue = orders.filter(o => !isDone(o) && o.pickupDate && o.pickupDate < today);
  const badge = document.getElementById('alertBadge');
  if (overdue.length > 0) {
    badge.style.display = 'block';
    document.getElementById('alertCount').textContent = overdue.length;
  } else {
    badge.style.display = 'none';
  }
}

// ══════════════════════════════
// カレンダー
// ══════════════════════════════
function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderDashboard(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderDashboard(); }

function renderDashboard() {
  document.getElementById('calTitle').textContent = `${calYear}年${calMonth+1}月`;

  const first = new Date(calYear, calMonth, 1);
  const last = new Date(calYear, calMonth+1, 0);
  const today = todayStr();

  // カレンダーグリッド
  const dows = ['日','月','火','水','木','金','土'];
  let html = dows.map(d => `<div class="dow">${d}</div>`).join('');

  // 前月の日
  for (let i = 0; i < first.getDay(); i++) {
    const d = new Date(calYear, calMonth, -first.getDay()+i+1);
    html += `<div class="cal-cell other-month"><div class="cal-day">${d.getDate()}</div></div>`;
  }

  // 当月の日
  for (let d = 1; d <= last.getDate(); d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayOrders = orders.filter(o => o.pickupDate === ds);
    const dow = new Date(calYear, calMonth, d).getDay();
    const isToday = ds === today;
    const isSel = ds === selectedDate;

    let cls = 'cal-cell';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';

    let chips = '';
    const pending = dayOrders.filter(o => !isDone(o));
    const done = dayOrders.filter(o => isDone(o));
    const showItems = [...pending, ...done].slice(0, 2);
    showItems.forEach(o => {
      const bg = isDone(o) ? '#27ae60' : '#e74c3c';
      chips += `<div class="cal-chip" style="background:${bg}">${o.customerName} ${o.repairContent.slice(0,6)}...</div>`;
    });
    if (dayOrders.length > 2) chips += `<div class="cal-more">+${dayOrders.length-2}件</div>`;

    html += `<div class="${cls}" onclick="selectDate('${ds}')">
      <div class="cal-day">${d}</div>
      ${chips}
    </div>`;
  }

  // 翌月
  const remaining = 7 - ((first.getDay() + last.getDate()) % 7);
  if (remaining < 7) {
    for (let i = 1; i <= remaining; i++) {
      html += `<div class="cal-cell other-month"><div class="cal-day">${i}</div></div>`;
    }
  }

  document.getElementById('calGrid').innerHTML = html;
  renderDayDetail(selectedDate);
}

function selectDate(ds) {
  selectedDate = ds;
  renderDashboard();
}

function renderDayDetail(ds) {
  const dayOrders = orders.filter(o => o.pickupDate === ds);
  const today = todayStr();
  const d = new Date(ds + 'T00:00:00');
  const diff = Math.round((d - new Date(today + 'T00:00:00')) / 86400000);
  const label = diff === 0 ? '【今日】' : diff > 0 ? `${diff}日後` : `${Math.abs(diff)}日前`;
  const weekdays = ['日','月','火','水','木','金','土'];
  const dateLabel = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${weekdays[d.getDay()]})`;

  const pending = dayOrders.filter(o => !isDone(o));
  const done = dayOrders.filter(o => isDone(o));
  const chipBg = pending.length > 0 ? '#e74c3c' : '#3a3a4a';

  let cardsHtml = '';
  if (dayOrders.length === 0) {
    cardsHtml = '<p class="empty">この日の受取予定はありません</p>';
  } else {
    if (pending.length > 0) cardsHtml += pending.map(o => cardHTML(o)).join('');
    if (done.length > 0) cardsHtml += `<p class="done-label">✓ 完成済み</p>` + done.map(o => cardHTML(o)).join('');
  }

  document.getElementById('dayDetail').innerHTML = `
    <div class="day-detail">
      <div class="day-detail-title">${dateLabel} <span style="color:var(--muted);font-size:14px">${label}</span></div>
      <span class="count-chip" style="background:${chipBg}">未完成 ${pending.length}件 / 計 ${dayOrders.length}件</span>
      ${cardsHtml}
    </div>`;

  // ステータスボタンのイベントをバインド
  bindStatusBtns(document.getElementById('dayDetail'));
}

function cardHTML(o) {
  const statuses = getStatuses(o.vendorId);
  const idx = statuses.indexOf(o.status);
  const hasNext = idx >= 0 && idx < statuses.length - 1;
  const vendor = vendors.find(v => v.id === o.vendorId);
  const vendorName = vendor ? vendor.name : o.vendorId;

  const statusColor = STATUS_COLOR[o.status] || '#444';
  const statusBtn = hasNext
    ? `<div class="status-btn" style="background:${STATUS_COLOR[statuses[idx+1]]||'#444'}" data-id="${o.id}">→ ${statuses[idx+1]}</div>`
    : `<div class="status-btn status-done">✓ 完成</div>`;

  return `<div class="card">
    <div class="card-header">
      <div>
        <div class="customer-name">${esc(o.customerName)}</div>
        ${o.phone ? `<div class="phone">${esc(o.phone)}</div>` : ''}
      </div>
      ${statusBtn}
    </div>
    <p class="repair-content">${esc(o.repairContent)}</p>
    <div class="tags">
      <span class="tag" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border)">🏭 ${esc(vendorName)}</span>
      <span class="tag" style="background:${statusColor}">${esc(o.status)}</span>
    </div>
  </div>`;
}

// ステータスボタンのイベントバインド（共通）
function bindStatusBtns(container) {
  if (!container) return;
  container.querySelectorAll('.status-btn[data-id]').forEach(btn => {
    // 既存のリスナーを削除して再追加
    const newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.addEventListener('click', function() {
      advanceStatus(this.dataset.id);
    });
    newBtn.addEventListener('touchend', function(e) {
      e.preventDefault();
      advanceStatus(this.dataset.id);
    }, { passive: false });
  });
}

// ══════════════════════════════
// ステータス更新
// ══════════════════════════════
function advanceStatus(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  const list = getStatuses(o.vendorId);
  const idx = list.indexOf(o.status);
  if (idx < 0 || idx >= list.length - 1) return;
  const newStatus = list[idx + 1];
  const updated = { ...o, status: newStatus, updatedAt: new Date().toISOString() };

  // ローカル即時更新
  orders = orders.map(x => x.id === id ? updated : x);
  if (currentView === 'dashboard') renderDashboard();
  if (currentView === 'list') renderList();

  // Firebaseに保存
  fbSaveOrder(updated);
  showToast(`✅ ${o.customerName}さん：${newStatus}`);
}

// ══════════════════════════════
// 一覧
// ══════════════════════════════
function setFilter(f, btn) {
  listFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const q = (document.getElementById('searchBox')?.value || '').toLowerCase();
  let filtered = orders.filter(o =>
    (o.customerName||'').toLowerCase().includes(q) ||
    (o.repairContent||'').toLowerCase().includes(q)
  );

  const all = filtered.length;
  const pending = filtered.filter(o => !isDone(o)).length;
  const done = filtered.filter(o => isDone(o)).length;

  document.getElementById('cnt-all').textContent = all;
  document.getElementById('cnt-pending').textContent = pending;
  document.getElementById('cnt-done').textContent = done;

  if (listFilter === 'pending') filtered = filtered.filter(o => !isDone(o));
  if (listFilter === 'done') filtered = filtered.filter(o => isDone(o));

  // 日付逆順
  filtered = [...filtered].sort((a,b) => (b.pickupDate||'').localeCompare(a.pickupDate||''));

  if (filtered.length === 0) {
    document.getElementById('list-items').innerHTML = '<p class="empty">データがありません</p>';
    return;
  }

  const html = filtered.map(o => {
    const statuses = getStatuses(o.vendorId);
    const idx = statuses.indexOf(o.status);
    const hasNext = idx >= 0 && idx < statuses.length - 1;
    const mm = (o.pickupDate||'').slice(5,7);
    const dd = (o.pickupDate||'').slice(8,10);
    const statusBtn = hasNext
      ? `<div class="status-btn" style="background:${STATUS_COLOR[statuses[idx+1]]||'#444'};font-size:12px;padding:6px 10px" data-id="${o.id}">→ ${statuses[idx+1]}</div>`
      : `<div class="status-btn status-done" style="font-size:12px;padding:6px 10px">✓ 完成</div>`;

    return `<div class="list-item">
      <div class="list-date">${mm}/${dd}</div>
      <div class="list-info">
        <div class="list-name">${esc(o.customerName)}</div>
        <div class="list-repair">${esc(o.repairContent)}</div>
      </div>
      <div class="list-actions">
        ${statusBtn}
        <button class="edit-btn" onclick="startEdit('${o.id}')">編集</button>
        <button class="del-btn" onclick="deleteOrder('${o.id}')">削除</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('list-items').innerHTML = html;
  bindStatusBtns(document.getElementById('list-items'));
}

function initForm(id) {
  editId = id;
  document.getElementById('f-edit-id').value = id || '';

  if (id) {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    document.getElementById('f-date').value = o.pickupDate || '';
    document.getElementById('f-name').value = o.customerName || '';
    document.getElementById('f-phone').value = o.phone || '';
    document.getElementById('f-repair').value = o.repairContent || '';
    document.getElementById('f-vendor').value = o.vendorId || 'shop';
  } else {
    document.getElementById('f-date').value = '';
    document.getElementById('f-name').value = '';
    document.getElementById('f-phone').value = '';
    document.getElementById('f-repair').value = '';
    document.getElementById('f-vendor').value = 'shop';
  }
}

function startEdit(id) {
  editId = id;
  goto('register');
  setTimeout(() => initForm(id), 100);
}

function renderVendorSelect() {
  const sel = document.getElementById('f-vendor');
  if (!sel) return;
  sel.innerHTML = vendors.map(v => `<option value="${v.id}">${v.name}</option>`).join('');
}

function saveOrder() {
  const pickupDate = document.getElementById('f-date').value;
  const customerName = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const repairContent = document.getElementById('f-repair').value.trim();
  const vendorId = document.getElementById('f-vendor').value;

  if (!pickupDate) { showToast('⚠ 受取予定日を入力してください', 'warn'); return; }
  if (!customerName) { showToast('⚠ お客様名を入力してください', 'warn'); return; }
  if (!repairContent) { showToast('⚠ 修理内容を入力してください', 'warn'); return; }

  const id = editId || newId();
  const existing = orders.find(o => o.id === id);

  const order = {
    id,
    customerName,
    phone,
    repairContent,
    pickupDate,
    vendorId,
    status: existing ? existing.status : '受付中',
    createdAt: existing ? existing.createdAt : new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };

  fbSaveOrder(order);
  showToast(editId ? '✅ 更新しました' : '✅ 受付登録しました');
  editId = null;
  goto('dashboard');
}

function deleteOrder(id) {
  if (!confirm('この記録を削除しますか？')) return;
  fbDeleteOrder(id);
  showToast('🗑 削除しました', 'warn');
}

function renderVendors() {
  const html = vendors.map(v => `
    <div class="vendor-item">
      <span class="vendor-name">🏭 ${esc(v.name)}</span>
      ${v.isShop ? '<span style="font-size:12px;color:var(--muted)">固定</span>'

function addVendor() {
  const inp = document.getElementById('new-vendor');
  const name = inp.value.trim();
  if (!name) return;
  vendors.push({ id: 'v' + Date.now(), name, isShop: false });
  fbSaveVendors();
  inp.value = '';
  renderVendors();
  renderVendorSelect();
  showToast('✅ 追加しました');

function removeVendor(id) {
  vendors = vendors.filter(v => v.id !== id);
  fbSaveVendors();
  renderVendors();
  renderVendorSelect();
  showToast('🗑 削除しました', 'warn');

const GAS_URL = 'https://script.google.com/macros/s/AKfycbwQML6zZVJLpncdXJSDDuK73ksYC9rte2ln3_DHOgrXtdE1Zq9RHIQlsFQ4tPN1UPnp/exec';

async function importFromSheet() {
  if (!confirm('スプレッドシートのデータをFirebaseにインポートします。既存のデータは上書きされません。続けますか？')) return;
  showToast('📥 インポート中...', 'warn');
  try {
    const res = await fetch(GAS_URL + '?action=getAll');
    const data = await res.json();
    if (!data.success || !data.data) { showToast('⚠ データ取得失敗', 'err'); return; }

    let count = 0;
    for (const o of data.data) {
      if (!o.id || !o.customerName) continue;
      let pd = String(o.pickupDate || '');
      if (pd.length > 10) pd = pd.slice(0, 10);
      const order = {
        id: String(o.id),
        customerName: o.customerName || '',
        phone: o.phone || '',
        repairContent: o.repairContent || '',
        pickupDate: pd,
        vendorId: 'shop',
        status: o.status || '受付中',
        createdAt: o.createdAt || new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      await fbSaveOrder(order);
      count++;
    }
    showToast(`✅ ${count}件インポート完了！`);
  } catch(e) {
    showToast('⚠ インポートエラー: ' + e.message, 'err');
  }
}

// ══════════════════════════════
// OCR
// ══════════════════════════════
function openOcrModal() {
  document.getElementById('ocrModal').classList.add('active');
  document.getElementById('ocr-upload-area').style.display = 'block';
  document.getElementById('ocr-loading').style.display = 'none';
  document.getElementById('ocr-input').value = '';
}

function closeOcrModal() {
  document.getElementById('ocrModal').classList.remove('active');
}

function compressImage(dataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let {width, height} = img;
      const maxDim = 1920;
      if (width > maxDim || height > maxDim) {
        if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
        else { width = Math.round(width * maxDim / height); height = maxDim; }
      }
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      let quality = 0.85;
      let result = canvas.toDataURL('image/jpeg', quality);
      while (result.length > 4 * 1024 * 1024 * 1.37 && quality > 0.3) {
        quality -= 0.1;
        result = canvas.toDataURL('image/jpeg', quality);
      }
      resolve(result.split(',')[1]);
    };
    img.src = dataUrl;
  });
}

async function handleOcrImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async (e) => {
    document.getElementById('ocr-upload-area').style.display = 'none';
    document.getElementById('ocr-loading').style.display = 'block';

    const CLAUDE_API_KEY = localStorage.getItem('momose_claude_key') || '';
    if (!CLAUDE_API_KEY) {
      closeOcrModal();
      showToast('⚠ 設定でAPIキーを登録してください', 'warn');
      goto('settings');
      return;
    }

    try {
      const base64 = await compressImage(e.target.result);
      const today = new Date();
      const yyyy = today.getFullYear();

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': CLAUDE_API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
              { type: 'text', text: `この洋服お直し店の作業伝票を読み取って、以下の形式でJSONのみを返してください。年は${yyyy}年として解釈してください。{"customerName":"お客様名（様は除く）","phone":"電話番号","repairContent":"修理内容","pickupDate":"受取予定日をYYYY-MM-DD形式で"}` }
            ]
          }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.content?.[0]?.text || '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      // フォームに入力
      if (parsed.pickupDate) document.getElementById('f-date').value = parsed.pickupDate;
      if (parsed.customerName) document.getElementById('f-name').value = parsed.customerName;
      if (parsed.phone) document.getElementById('f-phone').value = parsed.phone;
      if (parsed.repairContent) document.getElementById('f-repair').value = parsed.repairContent;

      closeOcrModal();
      showToast('✅ 読み取り完了！内容を確認してください');

    } catch(err) {
      document.getElementById('ocr-upload-area').style.display = 'block';
      document.getElementById('ocr-loading').style.display = 'none';
      showToast('⚠ 読み取りエラー: ' + err.message, 'err');
    }
  };
  reader.readAsDataURL(file);
}

}
