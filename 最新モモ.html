<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOMOSE 修理管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#0f0f13;--surface:#1a1a22;--high:#22222e;--border:#2e2e3e;
    --text:#f0eff5;--muted:#8885a0;--red:#ff4d6d;--yellow:#ffb347;
    --blue:#4d9fff;--green:#4dffb4;--purple:#a78bfa;
  }
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;min-height:100vh;}
  button{cursor:pointer;transition:opacity .15s;}
  button:hover{opacity:.82;}
  input,select,textarea{outline:none;font-family:inherit;}
  input:focus,select:focus,textarea:focus{border-color:var(--blue)!important;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

  /* ── HEADER ── */
  header{background:var(--surface);border-bottom:1px solid var(--border);
    padding:0 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-height:56px;}
  .logo{font-weight:900;font-size:18px;letter-spacing:2px;}
  .logo-sub{font-size:11px;color:var(--muted);}
  .alert-badge{background:var(--red);color:#fff;border-radius:20px;padding:3px 12px;
    font-size:13px;font-weight:700;animation:pulse 1.5s infinite;display:none;}
  nav{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;}
  nav button{background:transparent;border:1px solid var(--border);color:var(--muted);
    border-radius:8px;padding:7px 14px;font-size:14px;font-family:inherit;}
  nav button.active{background:var(--high);border-color:var(--blue);color:var(--text);font-weight:700;}

  /* ── MAIN ── */
  main{padding:20px 16px;max-width:900px;margin:0 auto;}
  .view{display:none;}
  .view.active{display:block;}

  /* ── SECTION ── */
  .section{background:var(--surface);border-radius:12px;padding:20px;margin-bottom:20px;
    border:1px solid var(--border);}
  .section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .section-title{font-weight:800;font-size:17px;}
  .section-date{font-size:13px;color:var(--muted);}
  .count-chip{margin-left:auto;border-radius:20px;padding:3px 12px;font-size:13px;font-weight:700;color:#fff;}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}

  /* ── CARD ── */
  .card{background:var(--high);border-radius:10px;padding:14px;border:1px solid var(--border);
    transition:opacity .2s;}
  .card.done{opacity:.5;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .customer-name{font-weight:700;font-size:16px;}
  .phone{font-size:12px;color:var(--muted);margin-top:2px;}
  .repair-content{font-size:14px;color:#d0cfe0;margin-bottom:10px;line-height:1.5;white-space:pre-wrap;}
  .card-bottom{display:flex;align-items:center;gap:8px;}
  .vendor-tag{border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;color:#fff;}
  .status-btn{border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;
    color:#fff;white-space:nowrap;font-family:inherit;}
  .edit-btn{margin-left:auto;background:transparent;border:1px solid var(--border);
    color:var(--muted);border-radius:6px;padding:4px 10px;font-size:12px;font-family:inherit;}
  .empty{color:var(--muted);text-align:center;padding:28px 0;}
  .done-label{font-size:12px;color:var(--muted);font-weight:600;margin:14px 0 8px;}

  /* ── FORM ── */
  .form-wrap{background:var(--surface);border-radius:12px;padding:24px;max-width:560px;
    margin:0 auto;border:1px solid var(--border);}
  .form-title{font-weight:800;font-size:18px;margin-bottom:20px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .field-full{grid-column:1/-1;}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px;font-weight:600;}
  .inp{width:100%;background:var(--high);border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;color:var(--text);font-size:15px;font-family:inherit;}
  textarea.inp{height:88px;resize:vertical;}
  .btn-row{display:flex;gap:10px;margin-top:24px;}
  .btn-primary{flex:1;background:var(--blue);border:none;border-radius:8px;padding:12px;
    color:#fff;font-size:16px;font-weight:700;font-family:inherit;}
  .btn-primary:disabled{opacity:.4;}
  .btn-secondary{flex:1;background:transparent;border:1px solid var(--border);border-radius:8px;
    padding:12px;color:var(--muted);font-size:16px;font-family:inherit;}

  /* ── LIST ── */
  .filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .filter-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
    border-radius:20px;padding:5px 14px;font-size:13px;font-family:inherit;}
  .filter-btn.active{border-color:var(--blue);color:var(--blue);font-weight:700;}
  .list-item{background:var(--high);border-radius:10px;padding:12px 14px;border:1px solid var(--border);
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px;transition:opacity .2s;}
  .list-item.done{opacity:.5;}
  .date-badge{min-width:50px;text-align:center;}
  .date-badge .day-label{font-size:11px;font-weight:700;}
  .date-badge .day-num{font-size:15px;font-weight:700;}
  .list-info{flex:1;min-width:160px;}
  .list-name{font-weight:700;}
  .list-content{font-size:13px;color:#d0cfe0;margin-top:2px;}
  .list-actions{display:flex;gap:8px;align-items:center;}
  .del-btn{background:transparent;border:1px solid var(--red);color:var(--red);
    border-radius:6px;padding:4px 10px;font-size:12px;font-family:inherit;}

  /* ── VENDOR ── */
  .vendor-item{display:flex;align-items:center;gap:10px;background:var(--high);
    border-radius:8px;padding:10px 14px;border:1px solid var(--border);margin-bottom:10px;}
  .vendor-fixed{font-size:11px;color:var(--muted);}

  /* ── CALENDAR ── */
  .cal-wrap{background:var(--surface);border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:20px;}
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-title{font-weight:800;font-size:17px;}
  .cal-nav{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:16px;font-family:inherit;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0;}
  .cal-dow.sun{color:#ff6b6b;} .cal-dow.sat{color:#4d9fff;}
  .cal-cell{min-height:72px;border-radius:8px;border:1px solid var(--border);background:var(--high);
    display:flex;flex-direction:column;align-items:stretch;gap:0;
    cursor:pointer;transition:all .15s;position:relative;padding:4px 5px;overflow:hidden;}
  .cal-cell:hover{border-color:var(--blue);background:#1e1e2e;}
  .cal-cell.today{border-color:var(--red);background:rgba(255,77,109,.12);}
  .cal-cell.selected{border-color:var(--blue);background:rgba(77,159,255,.18);}
  .cal-cell.other-month{opacity:.3;pointer-events:none;}
  .cal-cell.sun-cell .cal-day{color:#ff6b6b;}
  .cal-cell.sat-cell .cal-day{color:#4d9fff;}
  .cal-day{font-size:13px;font-weight:800;line-height:1.2;margin-bottom:2px;}
  .cal-chip{font-size:9px;font-weight:700;border-radius:3px;padding:1px 4px;
    color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    margin-bottom:1px;max-width:100%;display:block;}
  .cal-more{font-size:9px;color:var(--muted);font-weight:700;margin-top:1px;}

  /* ── DAY DETAIL ── */
  .day-detail{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border);}
  .day-detail-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .day-detail-title{font-weight:800;font-size:18px;}
  .day-detail-close{margin-left:auto;background:transparent;border:1px solid var(--border);
    color:var(--muted);border-radius:8px;padding:6px 14px;font-family:inherit;font-size:14px;}

  /* ── TOAST ── */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    border-radius:10px;padding:12px 28px;color:#fff;font-weight:700;font-size:15px;
    z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.4);display:none;white-space:nowrap;}
</style>
</head>
<body>

<header>
  <span class="logo">✂ MOMOSE</span>
  <span class="logo-sub">修理管理</span>
  <div class="alert-badge" id="alertBadge">⚠ 要確認 <span id="alertCount">0</span>件</div>
  <nav>
    <button class="active" onclick="goto('dashboard')">🏠 ホーム</button>
    <button onclick="goto('register')">＋ 受付</button>
    <button onclick="goto('list')">📋 一覧</button>
    <button onclick="goto('vendors')">🏭 委託先</button>
    <button onclick="goto('settings')">⚙️ 設定</button>
  </nav>
</header>

<main>
  <!-- ダッシュボード -->
  <div id="view-dashboard" class="view active">
    <!-- カレンダー -->
    <div class="cal-wrap">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrev()">‹</button>
        <span class="cal-title" id="cal-title"></span>
        <button class="cal-nav" onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <!-- 選択日の詳細 -->
    <div id="day-detail-wrap"></div>
  </div>

  <!-- 写真読み取りモーダル -->
  <div id="ocr-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;padding:16px;">
    <div style="background:var(--surface);border-radius:16px;padding:24px;width:100%;max-width:480px;border:1px solid var(--border);">
      <h3 style="font-weight:800;font-size:17px;margin-bottom:16px;">📷 伝票を写真で読み取る</h3>

      <!-- 未選択状態 -->
      <div id="ocr-upload-area" style="border:2px dashed var(--border);border-radius:12px;padding:32px 16px;text-align:center;cursor:pointer;" onclick="document.getElementById('ocr-input').click()">
        <div style="font-size:40px;margin-bottom:8px;">📄</div>
        <p style="color:var(--muted);font-size:14px;">ここをタップして伝票の写真を選択</p>
        <p style="color:var(--muted);font-size:12px;margin-top:4px;">カメラで撮影またはアルバムから選択</p>
      </div>
      <input type="file" id="ocr-input" accept="image/*" capture="environment" style="display:none" onchange="handleOcrImage(event)">

      <!-- プレビュー -->
      <div id="ocr-preview" style="display:none;margin-top:12px;">
        <img id="ocr-img" style="width:100%;border-radius:8px;max-height:200px;object-fit:contain;background:#111;">
        <button onclick="document.getElementById('ocr-input').click()" style="margin-top:8px;width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px;font-family:inherit;font-size:13px;">📷 撮り直す</button>
      </div>

      <!-- 読み取り中 -->
      <div id="ocr-loading" style="display:none;text-align:center;padding:20px;">
        <div style="font-size:28px;animation:pulse 1s infinite;">🔍</div>
        <p style="color:var(--muted);margin-top:8px;font-size:14px;">伝票を読み取っています...</p>
      </div>

      <!-- 読み取り結果 -->
      <div id="ocr-result" style="display:none;margin-top:16px;">
        <p style="font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:600;">✅ 読み取り結果（確認・修正してください）</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px;">お客様名</label>
            <input class="inp" id="ocr-name" style="font-size:14px;">
          </div>
          <div>
            <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px;">電話番号</label>
            <input class="inp" id="ocr-phone" style="font-size:14px;">
          </div>
          <div style="grid-column:1/-1;">
            <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px;">お預かり品・修理内容</label>
            <textarea class="inp" id="ocr-content" style="height:72px;font-size:14px;resize:vertical;"></textarea>
          </div>
          <div>
            <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px;">出来上がり日</label>
            <input type="date" class="inp" id="ocr-date" style="font-size:14px;">
          </div>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:20px;">
        <button onclick="closeOcrModal()" style="flex:1;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:12px;font-family:inherit;font-size:15px;">キャンセル</button>
        <button id="ocr-apply-btn" onclick="applyOcrResult()" style="display:none;flex:1;background:var(--green);border:none;border-radius:8px;padding:12px;color:#0f0f13;font-weight:700;font-family:inherit;font-size:15px;">✅ この内容で登録</button>
      </div>
    </div>
  </div>

  <!-- 受付フォーム -->
  <div id="view-register" class="view">
    <div class="form-wrap">
      <h2 class="form-title" id="form-title">＋ 新規受付登録</h2>

      <!-- 写真読み取りボタン -->
      <button onclick="openOcrModal()" style="width:100%;background:linear-gradient(135deg,#1a2a3a,#1a3a2a);border:1px solid var(--blue);border-radius:10px;padding:14px;color:var(--text);font-size:15px;font-weight:700;font-family:inherit;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;">
        📷 伝票を写真で読み取る（自動入力）
      </button>
      <p style="text-align:center;font-size:12px;color:var(--muted);margin:-14px 0 20px;">↑ 写真を撮るだけで下のフォームに自動入力されます</p>

      <input type="hidden" id="edit-id">
      <div class="form-grid">
        <div>
          <label>お客様名 ＊</label>
          <input class="inp" id="f-name" placeholder="山田 花子">
        </div>
        <div>
          <label>電話番号</label>
          <input class="inp" id="f-phone" placeholder="090-xxxx-xxxx" inputmode="tel">
        </div>
        <div class="field-full">
          <label>修理内容 ＊</label>
          <textarea class="inp" id="f-content" placeholder="例：スラックス丈詰め 2cm、ウエスト出し"></textarea>
        </div>
        <div>
          <label>受取予定日 ＊</label>
          <input type="date" class="inp" id="f-date">
        </div>
        <div>
          <label>作業場所・委託先</label>
          <select class="inp" id="f-vendor"></select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="goto('dashboard')">キャンセル</button>
        <button class="btn-primary" id="save-btn" onclick="saveOrder()">登録する</button>
      </div>
    </div>
  </div>

  <!-- 一覧 -->
  <div id="view-list" class="view">
    <input class="inp" id="search-input" placeholder="🔍 お客様名・内容で検索" oninput="renderList()" style="margin-bottom:14px">
    <div class="filter-row" id="filter-row"></div>
    <div id="list-items"></div>
  </div>

  <!-- 委託先管理 -->
  <div id="view-vendors" class="view">
    <div class="form-wrap" style="max-width:480px">
      <h2 class="form-title">🏭 委託先管理</h2>
      <div id="vendor-list"></div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <input class="inp" id="new-vendor" placeholder="新しい委託先名" style="flex:1"
          onkeydown="if(event.key==='Enter')addVendor()">
        <button class="btn-primary" style="flex:0 0 70px" onclick="addVendor()">追加</button>
      </div>
      <p style="font-size:12px;color:var(--muted);margin-top:10px">※「店舗内作業」は削除できません</p>
    </div>
  </div>
  <!-- 設定 -->
  <div id="view-settings" class="view">
    <div class="form-wrap">
      <p class="form-title">⚙️ 設定</p>
      <div style="margin-bottom:20px;">
        <label>📷 Gemini APIキー（写真読み取り用）</label>
        <input id="s-apikey" class="inp" type="password" placeholder="AIzaSy..." style="margin-top:6px;">
        <p style="font-size:12px;color:var(--muted);margin-top:6px;">キーはこの端末のみに保存されます。外部には送信されません。</p>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="saveApiKey()">💾 保存する</button>
        <button class="btn-secondary" onclick="goto('dashboard')">キャンセル</button>
      </div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
// ══════════════════════════════
// データ管理
// ══════════════════════════════
const LS_O = 'momose_orders_v3';
const LS_V = 'momose_vendors_v3';

const DEFAULT_VENDORS = [
  {id:'shop', name:'店舗内作業', isShop:true},
  {id:'v1', name:'オカダテーラー', isShop:false},
  {id:'v2', name:'ホリウチ縫製', isShop:false},
  {id:'v3', name:'カナザワリフォーム', isShop:false},
];

let orders = (() => { try { return JSON.parse(localStorage.getItem(LS_O)||'[]'); } catch{return[];} })();
let vendors = (() => { try { const v=localStorage.getItem(LS_V); return v?JSON.parse(v):DEFAULT_VENDORS; } catch{return DEFAULT_VENDORS;} })();

const saveO = () => localStorage.setItem(LS_O, JSON.stringify(orders));
const saveV = () => localStorage.setItem(LS_V, JSON.stringify(vendors));

// ══════════════════════════════
// 日付ユーティリティ
// ══════════════════════════════
const todayStr = () => new Date().toISOString().slice(0,10);
const tomorrowStr = () => { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); };
const fmtFull = s => { if(!s)return''; const[y,m,d]=s.split('-'); return `${y}年${m}月${d}日`; };
const fmtShort = s => { if(!s)return''; const[,m,d]=s.split('-'); return `${m}/${d}`; };
let _seq = Date.now();
const newId = () => `o${++_seq}`;

const vendorById = id => vendors.find(v=>v.id===id) || {name:id, isShop:false};

// ══════════════════════════════
// ナビ
// ══════════════════════════════
let currentView = 'dashboard';
function goto(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach((b,i)=>{
    b.classList.toggle('active', ['dashboard','register','list','vendors','settings'][i]===v);
  });
  currentView = v;
  if(v==='dashboard') renderDashboard();
  if(v==='register') initForm();
  if(v==='list') renderList();
  if(v==='vendors') renderVendors();
  if(v==='settings') initSettings();
}

// ══════════════════════════════
// ダッシュボード
// ══════════════════════════════
// カレンダー状態
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-11
let selectedDate = todayStr();

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderDashboard(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderDashboard(); }

function renderDashboard() {
  renderCalendar();
  renderDayDetail(selectedDate);
  // バッジ更新
  const total = orders.filter(o=>!isDone(o)).length;
  const badge = document.getElementById('alertBadge');
  document.getElementById('alertCount').textContent = total;
  badge.style.display = total > 0 ? 'block' : 'none';
}

function renderCalendar() {
  const td = todayStr();
  const y = calYear, m = calMonth;
  document.getElementById('cal-title').textContent = `${y}年${m+1}月`;

  const firstDay = new Date(y, m, 1).getDay(); // 0=日
  const lastDate = new Date(y, m+1, 0).getDate();

  const DOWS = ['日','月','火','水','木','金','土'];
  let html = DOWS.map((d,i)=>`<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');

  // 前月の空白
  for(let i=0; i<firstDay; i++){
    const prevLast = new Date(y, m, 0).getDate();
    const d = prevLast - firstDay + i + 1;
    html += `<div class="cal-cell other-month"><span class="cal-day">${d}</span></div>`;
  }

  for(let d=1; d<=lastDate; d++){
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ord = orders.filter(o=>o.pickupDate===ds);
    const pending = ord.filter(o=>!isDone(o));
    const done = ord.filter(o=>isDone(o));
    const isToday = ds===td;
    const isSel = ds===selectedDate;
    const dow = new Date(y,m,d).getDay();
    const isSun = dow===0, isSat = dow===6;

    // セル内プレビュー（最大2件表示）
    const maxShow = 2;
    let chips = '';
    const showOrd = [...pending, ...done].slice(0, maxShow);
    showOrd.forEach(o => {
      const bg = isDone(o) ? '#27ae60' : 'var(--red)';
      const name = o.customerName.length > 4 ? o.customerName.slice(0,4)+'…' : o.customerName;
      const content = o.repairContent.replace(/\n/g,' ');
      const short = content.length > 6 ? content.slice(0,6)+'…' : content;
      chips += `<span class="cal-chip" style="background:${bg}">${name} ${short}</span>`;
    });
    const extra = ord.length > maxShow ? `<span class="cal-more">+${ord.length - maxShow}件</span>` : '';

    html += `<div class="cal-cell ${isToday?'today':''} ${isSel?'selected':''} ${isSun?'sun-cell':''} ${isSat?'sat-cell':''}"
      onclick="selectDate('${ds}')">
      <span class="cal-day">${d}</span>
      ${chips}${extra}
    </div>`;
  }

  // 次月の空白
  const total = firstDay + lastDate;
  const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
  for(let i=1; i<=remain; i++){
    html += `<div class="cal-cell other-month"><span class="cal-day">${i}</span></div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
}

function selectDate(ds) {
  selectedDate = ds;
  renderCalendar();
  renderDayDetail(ds);
}

function renderDayDetail(ds) {
  const ord = orders.filter(o=>o.pickupDate===ds);
  const pending = ord.filter(o=>!isDone(o));
  const done = ord.filter(o=>isDone(o));
  const td = todayStr();
  const diff = Math.round((new Date(ds)-new Date(td))/(1000*60*60*24));
  let label = '';
  if(diff===0) label='<span style="color:var(--red);font-weight:800">【今日】</span>';
  else if(diff===1) label='<span style="color:var(--yellow);font-weight:800">【明日】</span>';
  else if(diff>1) label=`<span style="color:var(--muted);font-weight:700">${diff}日後</span>`;
  else label=`<span style="color:var(--muted);font-weight:700">${Math.abs(diff)}日前</span>`;

  const dateLabel = new Date(ds+'T00:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  const chipBg = pending.length>0 ? 'var(--red)' : '#3a3a4a';
  const accent = diff===0?'var(--red)':diff===1?'var(--yellow)':'var(--blue)';

  let cardsHtml = '';
  if(ord.length===0){
    cardsHtml = '<p class="empty">この日の受取予定はありません</p>';
  } else {
    if(pending.length>0) cardsHtml += `<div class="card-grid">${pending.map(o=>cardHTML(o,accent)).join('')}</div>`;
    if(done.length>0) cardsHtml += `<p class="done-label">✓ 完成済み</p><div class="card-grid">${done.map(o=>cardHTML(o,'#27ae60')).join('')}</div>`;
  }

  document.getElementById('day-detail-wrap').innerHTML = `
    <div class="day-detail">
      <div class="day-detail-header">
        <div>
          <div class="day-detail-title">${dateLabel} ${label}</div>
        </div>
        <span class="count-chip" style="background:${chipBg};border-radius:20px;padding:3px 12px;font-size:13px;font-weight:700;color:#fff;margin-left:auto">
          未完成 ${pending.length}件 / 計 ${ord.length}件
        </span>
      </div>
      ${cardsHtml}
    </div>`;
}

function renderCards(containerId, chipId, items, accent) {
  const pending = items.filter(o=>!isDone(o));
  const done    = items.filter(o=>isDone(o));
  const chip = document.getElementById(chipId);
  chip.textContent = `未完成 ${pending.length}件 / 計 ${items.length}件`;
  chip.style.background = pending.length>0 ? accent : '#3a3a4a';

  const el = document.getElementById(containerId);
  if(items.length===0){ el.innerHTML='<p class="empty">この日の受取予定はありません</p>'; return; }

  let html = '';
  if(pending.length>0) html += `<div class="card-grid">${pending.map(o=>cardHTML(o,accent)).join('')}</div>`;
  if(done.length>0) html += `<p class="done-label">✓ 完成済み</p><div class="card-grid">${done.map(o=>cardHTML(o,accent)).join('')}</div>`;
  el.innerHTML = html;
}

// ══════════════════════════════
// ステータス定義
// 店舗内：受付中 → 作業中 → 完成
// 委託先：受付中 → 委託中 → 店舗に戻った → 完成
// ══════════════════════════════
const SHOP_STATUSES = ['受付中','作業中','完成'];
const EXT_STATUSES  = ['受付中','委託中','店舗に戻った','完成'];

const STATUS_COLOR = {
  '受付中':      '#5a5a7a',
  '作業中':      '#e67e22',
  '委託中':      '#2980b9',
  '店舗に戻った':'#8e44ad',
  '完成':        '#27ae60',
};

function getStatuses(vendorId) {
  const v = vendorById(vendorId);
  return v.isShop ? SHOP_STATUSES : EXT_STATUSES;
}

function nextStatus(o) {
  const list = getStatuses(o.vendorId);
  const idx  = list.indexOf(o.status);
  if(idx === -1 || idx === list.size - 1) return null;
  return list[idx + 1] || null;
}

function isDone(o) { return o.status === '完成'; }

function statusLabel(o) {
  const list = getStatuses(o.vendorId);
  const idx  = list.indexOf(o.status);
  const next = list[idx + 1];
  if(!next) return '✓ 完成';
  return `→ ${next}`;
}

function cardHTML(o, accent) {
  const v          = vendorById(o.vendorId);
  const done       = isDone(o);
  const tagColor   = v.isShop ? 'var(--purple)' : 'var(--blue)';
  const tagIcon    = v.isShop ? '🏠' : '🚚';
  const borderColor= done ? '#444' : accent;
  const stColor    = STATUS_COLOR[o.status] || '#5a5a7a';
  const list       = getStatuses(o.vendorId);
  const idx        = list.indexOf(o.status);
  const hasNext    = idx >= 0 && idx < list.length - 1;

  // ステータスのステップ表示
  const steps = list.map((s,i) => {
    const active  = s === o.status;
    const passed  = idx > i;
    const col     = passed ? '#444' : active ? STATUS_COLOR[s] : '#333';
    const txtCol  = passed ? '#666' : active ? '#fff' : '#555';
    return `<span style="font-size:10px;padding:2px 6px;border-radius:4px;background:${col};color:${txtCol};white-space:nowrap">${s}</span>`;
  }).join('<span style="color:#444;font-size:10px;margin:0 1px">›</span>');

  return `
    <div class="card ${done?'done':''}" style="border-left:5px solid ${borderColor}">
      <div class="card-top">
        <div>
          <span class="customer-name">${esc(o.customerName)}</span>
          ${o.phone?`<div class="phone">${esc(o.phone)}</div>`:''}
        </div>
        ${hasNext
          ? `<button class="status-btn" style="background:${STATUS_COLOR[list[idx+1]]||'#444'}"
               onclick="advanceStatus('${o.id}')">→ ${esc(list[idx+1])}</button>`
          : `<span class="status-btn" style="background:#27ae60;cursor:default">✓ 完成</span>`
        }
      </div>
      <div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-bottom:8px">${steps}</div>
      <p class="repair-content">${esc(o.repairContent)}</p>
      <div class="card-bottom">
        <span class="vendor-tag" style="background:${tagColor}">${tagIcon} ${esc(v.name)}</span>
        <button class="edit-btn" onclick="startEdit('${o.id}')">編集</button>
      </div>
    </div>`;
}

// ══════════════════════════════
// 受付フォーム
// ══════════════════════════════
function initForm(id) {
  // 委託先セレクト構築
  const sel = document.getElementById('f-vendor');
  sel.innerHTML = vendors.map(v=>`<option value="${v.id}">${v.isShop?'🏠':'🚚'} ${esc(v.name)}</option>`).join('');

  const eid = document.getElementById('edit-id');
  if(id) {
    const o = orders.find(x=>x.id===id);
    if(!o) return;
    eid.value = id;
    document.getElementById('form-title').textContent = '✏️ 修理内容を編集';
    document.getElementById('f-name').value    = o.customerName;
    document.getElementById('f-phone').value   = o.phone||'';
    document.getElementById('f-content').value = o.repairContent;
    document.getElementById('f-date').value    = o.pickupDate;
    document.getElementById('f-vendor').value  = o.vendorId;
    document.getElementById('save-btn').textContent = '更新する';
  } else {
    eid.value = '';
    document.getElementById('form-title').textContent = '＋ 新規受付登録';
    document.getElementById('f-name').value    = '';
    document.getElementById('f-phone').value   = '';
    document.getElementById('f-content').value = '';
    document.getElementById('f-date').value    = tomorrowStr();
    document.getElementById('f-vendor').value  = 'shop';
    document.getElementById('save-btn').textContent = '登録する';
  }
}

function saveOrder() {
  const name    = document.getElementById('f-name').value.trim();
  const content = document.getElementById('f-content').value.trim();
  const date    = document.getElementById('f-date').value;
  if(!name||!content||!date){ showToast('⚠ 必須項目を入力してください','warn'); return; }

  const data = {
    customerName: name,
    phone:        document.getElementById('f-phone').value.trim(),
    repairContent:content,
    pickupDate:   date,
    vendorId:     document.getElementById('f-vendor').value,
  };
  const eid = document.getElementById('edit-id').value;
  if(eid) {
    orders = orders.map(o=>o.id===eid ? {...o,...data} : o);
    showToast('✅ 更新しました');
  } else {
    orders.push({id:newId(), status:'受付中', createdAt:todayStr(), ...data});
    showToast('✅ 受付登録しました');
  }
  saveO();
  goto('dashboard');
}

function startEdit(id) {
  goto('register');
  setTimeout(()=>initForm(id), 0);
}

// ══════════════════════════════
// ステータス進める
// ══════════════════════════════
function advanceStatus(id) {
  const o    = orders.find(x=>x.id===id);
  if(!o) return;
  const list = getStatuses(o.vendorId);
  const idx  = list.indexOf(o.status);
  if(idx < 0 || idx >= list.length - 1) return;
  const newStatus = list[idx + 1];
  orders = orders.map(x=>x.id===id ? {...x, status: newStatus} : x);
  saveO();
  showToast(`✅ ${o.customerName}さん：${newStatus}`);
  if(currentView==='dashboard') renderDashboard();
  else renderList();
}

// ══════════════════════════════
// 一覧
// ══════════════════════════════
let listFilter = 'all';

function renderList() {
  const pendingCount = orders.filter(o=>!isDone(o)).length;
  const doneCount    = orders.filter(o=>isDone(o)).length;
  const filters = [
    {key:'all',    label:`すべて (${orders.length})`},
    {key:'pending',label:`未完成 (${pendingCount})`},
    {key:'done',   label:`完成済 (${doneCount})`},
  ];
  document.getElementById('filter-row').innerHTML = filters.map(f=>
    `<button class="filter-btn ${listFilter===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.label}</button>`
  ).join('');

  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const td=todayStr(), tm=tomorrowStr();

  let list = [...orders].sort((a,b)=>a.pickupDate<b.pickupDate?-1:1);
  if(listFilter==='pending') list=list.filter(o=>!isDone(o));
  if(listFilter==='done')    list=list.filter(o=>isDone(o));
  if(q) list=list.filter(o=>o.customerName.includes(q)||o.repairContent.includes(q)||(o.phone||'').includes(q));

  if(list.length===0){ document.getElementById('list-items').innerHTML='<p class="empty">該当する記録がありません</p>'; return; }

  document.getElementById('list-items').innerHTML = list.map(o=>{
    const v        = vendorById(o.vendorId);
    const done     = isDone(o);
    const isToday    = o.pickupDate===td;
    const isTomorrow = o.pickupDate===tm;
    const dc  = isToday?'var(--red)':isTomorrow?'var(--yellow)':'var(--muted)';
    const bl  = done?'#444':isToday?'var(--red)':isTomorrow?'var(--yellow)':'var(--border)';
    const tagColor = v.isShop?'var(--purple)':'var(--blue)';
    const stColor  = STATUS_COLOR[o.status]||'#5a5a7a';
    const statuses = getStatuses(o.vendorId);
    const idx      = statuses.indexOf(o.status);
    const hasNext  = idx >= 0 && idx < statuses.length - 1;
    return `
      <div class="list-item ${done?'done':''}" style="border-left:5px solid ${bl}">
        <div class="date-badge">
          <div class="day-label" style="color:${dc}">${isToday?'今日':isTomorrow?'明日':''}</div>
          <div class="day-num" style="color:${dc}">${fmtShort(o.pickupDate)}</div>
        </div>
        <div class="list-info">
          <div class="list-name">${esc(o.customerName)}
            ${o.phone?`<span style="font-size:12px;color:var(--muted);margin-left:8px">${esc(o.phone)}</span>`:''}
          </div>
          <div class="list-content">${esc(o.repairContent)}</div>
          <div style="display:flex;gap:6px;align-items:center;margin-top:5px;flex-wrap:wrap;">
            <span class="vendor-tag" style="background:${tagColor}">${v.isShop?'🏠':'🚚'} ${esc(v.name)}</span>
            <span style="font-size:11px;padding:2px 8px;border-radius:4px;background:${stColor};color:#fff;font-weight:700">${esc(o.status)}</span>
          </div>
        </div>
        <div class="list-actions">
          ${hasNext
            ? `<button class="status-btn" style="background:${STATUS_COLOR[statuses[idx+1]]||'#444'};font-size:12px;padding:6px 10px"
                 onclick="advanceStatus('${o.id}')">→ ${esc(statuses[idx+1])}</button>`
            : `<span class="status-btn" style="background:#27ae60;font-size:12px;padding:6px 10px;cursor:default">✓ 完成</span>`
          }
          <button class="edit-btn" onclick="startEdit('${o.id}')">編集</button>
          <button class="del-btn" onclick="deleteOrder('${o.id}')">削除</button>
        </div>
      </div>`;
  }).join('');
}

function setFilter(f){ listFilter=f; renderList(); }

function deleteOrder(id) {
  if(!confirm('この記録を削除しますか？')) return;
  orders = orders.filter(o=>o.id!==id);
  saveO();
  renderList();
  showToast('🗑 削除しました','warn');
}

function renderVendors() {

function addVendor() {
  const inp = document.getElementById('new-vendor');
  const name = inp.value.trim();
  if(!name) return;
  vendors.push({id:`v${Date.now()}`, name, isShop:false});
  saveV(); inp.value=''; renderVendors();

function removeVendor(id) {
  vendors = vendors.filter(v=>v.id!==id);
  saveV(); renderVendors();
  showToast('🗑 削除しました','warn');
}

// ══════════════════════════════
// トースト
// ══════════════════════════════
let _toastTimer;
function showToast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='warn' ? '#c0392b' : '#1e7a45';
  el.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.style.display='none', 2500);
}

// ══════════════════════════════
// 写真読み取り（OCR）
// ══════════════════════════════
function openOcrModal() {
  const m = document.getElementById('ocr-modal');
  m.style.display = 'flex';
  // リセット
  document.getElementById('ocr-upload-area').style.display = 'block';
  document.getElementById('ocr-preview').style.display = 'none';
  document.getElementById('ocr-loading').style.display = 'none';
  document.getElementById('ocr-result').style.display = 'none';
  document.getElementById('ocr-apply-btn').style.display = 'none';
  document.getElementById('ocr-input').value = '';
}

function closeOcrModal() {
  document.getElementById('ocr-modal').style.display = 'none';
}

async function handleOcrImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  // プレビュー表示
  const reader = new FileReader();
  reader.onload = async (e) => {
    document.getElementById('ocr-img').src = e.target.result;
    document.getElementById('ocr-upload-area').style.display = 'none';
    document.getElementById('ocr-preview').style.display = 'block';
    document.getElementById('ocr-loading').style.display = 'block';
    document.getElementById('ocr-result').style.display = 'none';
    document.getElementById('ocr-apply-btn').style.display = 'none';

    // base64データ取得
    const base64 = e.target.result.split(',')[1];

    try {
      const today = new Date();
      const yyyy = today.getFullYear();
      const CLAUDE_API_KEY = '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';

      const response = await fetch(
        'https://api.anthropic.com/v1/messages',
        {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': CLAUDE_API_KEY,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 1024,
            messages: [{
              role: 'user',
              content: [
                { type: 'image', source: { type: 'base64', media_type: file.type || 'image/jpeg', data: base64 } },
                { type: 'text', text: `この洋服お直し店の作業伝票を読み取って、以下の形式でJSONのみを返してください。マークダウンや説明文は不要です。年は${yyyy}年として解釈してください。出来上がり日が「月/日」の形式の場合は「${yyyy}-MM-DD」形式に変換してください。{"customerName":"お客様名（様は除く）","phone":"電話番号","repairContent":"お預かり品と修理内容をまとめて記載","pickupDate":"出来上がり日をYYYY-MM-DD形式で"}` }
              ]
            }]
          })
        }
      );

      const rawText = await response.text();
      const data = JSON.parse(rawText);
      const text = data.content?.[0]?.text || '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      // 結果をフォームにセット
      document.getElementById('ocr-name').value    = parsed.customerName || '';
      document.getElementById('ocr-phone').value   = parsed.phone || '';
      document.getElementById('ocr-content').value = parsed.repairContent || '';
      document.getElementById('ocr-date').value    = parsed.pickupDate || '';

      document.getElementById('ocr-loading').style.display = 'none';
      document.getElementById('ocr-result').style.display = 'block';
      document.getElementById('ocr-apply-btn').style.display = 'block';

    } catch(err) {
      document.getElementById('ocr-loading').style.display = 'none';
      document.getElementById('ocr-upload-area').style.display = 'block';
      document.getElementById('ocr-preview').style.display = 'none';
      showToast('⚠ エラー: ' + (err.message || JSON.stringify(err)), 'warn');
      console.error('OCR Error:', err);
    }
  };
  reader.readAsDataURL(file);
}

function applyOcrResult() {
  document.getElementById('f-name').value    = document.getElementById('ocr-name').value;
  document.getElementById('f-phone').value   = document.getElementById('ocr-phone').value;
  document.getElementById('f-content').value = document.getElementById('ocr-content').value;
  document.getElementById('f-date').value    = document.getElementById('ocr-date').value;
  closeOcrModal();
  showToast('✅ 読み取り内容をフォームに入力しました');
}
